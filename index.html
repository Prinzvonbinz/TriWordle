<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TriWordle Profi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:#121213; color:white; font-family:Arial,sans-serif;
  overflow:hidden; touch-action:none;
  display:flex; justify-content:center; align-items:center;
}
#game{
  width:500px; height:700px;
  text-align:center;
  transform-origin: top center;
}
h1{font-size:32px; letter-spacing:2px; margin:8px 0;}
#timer{font-size:20px; margin:6px 0; color:#d7dadc;}
.tabs button{
  background:#3a3a3c; border:none; color:white;
  padding:10px 16px; margin:2px; border-radius:6px; cursor:pointer;
  font-size:16px;
}
.tabs button:hover{background:#565758;}
.board{
  display:grid; grid-template-columns:repeat(5,1fr); gap:3px;
  justify-items:center; margin-top:12px;
}
.tile, .colorTile{
  width:60px; height:60px; display:flex; justify-content:center; align-items:center;
  font-size:28px; font-weight:bold; text-transform:uppercase; cursor:pointer;
}
.tile{border:2px solid #3a3a3c; background:#3a3a3c; color:white;}
.colorTile{border-radius:6px; border:2px solid #3a3a3c;}
.green{background:#538d4e;border:none;}
.yellow{background:#b59f3b;border:none;}
.gray{background:#3a3a3c;border:none;}
.keyboard{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(48px,1fr));
  gap:3px; margin-top:12px;
}
.keyboard button{
  padding:12px; border:none; background:#818384; color:white; font-weight:bold; border-radius:6px; font-size:16px; cursor:pointer;
}
.keyboard button:hover{background:#a1a1a1;}
.hidden{display:none;}
#hint{min-height:24px; margin-top:8px; color:#6ec1ff; font-size:14px;}
#resultsBoard{display:flex; flex-direction:column; align-items:center; margin-top:12px;}
#resultsBoard div{margin:6px 0; font-size:18px;}
#restartBtn{margin-top:12px; padding:12px 24px; font-size:18px; cursor:pointer; border:none; border-radius:6px; background:#818384; color:white;}
</style>
</head>
<body>
<div id="game">
<h1>TRI WORDLE</h1>
<div id="timer">420</div>
<div class="tabs">
  <button id="tabWordBtn" onclick="tab('word')">WORT</button>
  <button id="tabNumberBtn" onclick="tab('number')">ZAHL</button>
  <button id="tabColorBtn" onclick="tab('color')">FARBEN</button>
  <button id="tabResultBtn" onclick="tab('result')" class="hidden">ERGEBNIS</button>
</div>
<div id="hint"></div>

<div id="wordTab">
  <div id="wordBoard" class="board"></div>
  <div id="wordKeyboard" class="keyboard"></div>
</div>
<div id="numberTab" class="hidden">
  <div id="numberBoard" class="board"></div>
  <div id="numberKeyboard" class="keyboard"></div>
</div>
<div id="colorTab" class="hidden">
  <div id="colorBoard" class="board"></div>
  <div id="colorKeyboard" class="keyboard"></div>
</div>
<div id="resultTab" class="hidden">
  <div id="resultsBoard"></div>
  <button id="restartBtn" onclick="restartGame()">Nochmal spielen</button>
</div>
</div>

<script>
// --- Automatische Skalierung ---
function resizeGame(){
  const game = document.getElementById("game");
  const scaleW = window.innerWidth / 520;   // Breite Puffer
  const scaleH = window.innerHeight / 720;  // Höhe Puffer
  const scale = Math.min(scaleW, scaleH, 1); // nie größer als 100%
  game.style.transform = "scale(" + scale + ")";
}
window.addEventListener("resize", resizeGame);
resizeGame(); // direkt beim Laden

// --- Variablen ---
let time=420; let guesses=0; let solved={word:false,number:false,color:false}; let failed=false;
const words=["TIGER","APFEL","STUHL","LAMPE","WOLKE","FLUSS","SCHUH","BLUME","STEIN","GLASS","TRAUM","WALD"];
const colors=["#FF3B3B","#3B8CFF","#3BFF68","#FFE63B","#B43BFF","#FF8CC0","#FF7D3B"];
let wordAnswer=words[Math.floor(Math.random()*words.length)];
let numberAnswer=""; for(let i=0;i<5;i++) numberAnswer+=Math.floor(Math.random()*10);
let colorAnswer=[]; for(let i=0;i<5;i++) colorAnswer.push(colors[Math.floor(Math.random()*colors.length)]);
let rowWord=0,rowNum=0,rowColor=0;
let guessWord="",guessNum="",guessColor=[];

// --- Timer ---
let timerInterval=setInterval(()=>{time--; document.getElementById("timer").innerText=time; if(time<=0){endGame(false);}},1000);

// --- Tabs ---
function tab(name){
  document.getElementById("wordTab").classList.add("hidden");
  document.getElementById("numberTab").classList.add("hidden");
  document.getElementById("colorTab").classList.add("hidden");
  document.getElementById("resultTab").classList.add("hidden");
  if(name==="word") document.getElementById("wordTab").classList.remove("hidden");
  if(name==="number") document.getElementById("numberTab").classList.remove("hidden");
  if(name==="color") document.getElementById("colorTab").classList.remove("hidden");
  if(name==="result") document.getElementById("resultTab").classList.remove("hidden");
}

// --- Boards ---
function createBoard(board,isColor){
  for(let r=0;r<6;r++){
    for(let c=0;c<5;c++){
      let t=document.createElement("div");
      t.className=isColor?"colorTile":"tile";
      if(isColor) t.style.background="#3a3a3c";
      t.onclick=()=>removeGuess(board,r,c,isColor);
      board.appendChild(t);
    }
  }
}
createBoard(document.getElementById("wordBoard"),false);
createBoard(document.getElementById("numberBoard"),false);
createBoard(document.getElementById("colorBoard"),true);

// --- Tastaturen ---
function keyboard(keys,id,press,isColor){
  keys.forEach(k=>{
    let b=document.createElement("button");
    if(isColor){ b.style.background=k; } else { b.innerText=k; }
    b.onclick=()=>press(k);
    id.appendChild(b);
  });
}
keyboard("ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),document.getElementById("wordKeyboard"),pressWord,false);
keyboard("0123456789".split(""),document.getElementById("numberKeyboard"),pressNumber,false);
keyboard(colors,document.getElementById("colorKeyboard"),pressColor,true);

// --- Entfernen per Klick ---
function removeGuess(board,row,col,isColor){
  if(failed) return;
  if(isColor && guessColor[col]) {guessColor[col]=""; board.children[row*5+col].style.background="#3a3a3c";}
  else if(!isColor && row===rowWord && board.id==="wordBoard" && guessWord[col]) {guessWord=guessWord.substr(0,col)+guessWord.substr(col+1); board.children[row*5+col].innerText="";}
  else if(!isColor && row===rowNum && board.id==="numberBoard" && guessNum[col]) {guessNum=guessNum.substr(0,col)+guessNum.substr(col+1); board.children[row*5+col].innerText="";}
}

// --- Update & Farben ---
function update(board,row,data,isColor){
  for(let i=0;i<5;i++){
    if(isColor) board.children[row*5+i].style.background=data[i]||"#3a3a3c";
    else board.children[row*5+i].innerText=data[i]||"";
  }
}
function colorCheck(board,row,guess,answer,isColor){
  for(let i=0;i<5;i++){
    let tile=board.children[row*5+i];
    if(isColor){ if(guess[i]===answer[i]) tile.style.border="2px solid #538d4e"; else if(answer.includes(guess[i])) tile.style.border="2px solid #b59f3b"; else tile.style.border="2px solid #3a3a3c";}
    else{
      if(guess[i]===answer[i]) tile.classList.add("green");
      else if(answer.includes(guess[i])) tile.classList.add("yellow");
      else tile.classList.add("gray");
    }
  }
}

// --- Logik ---
function pressWord(l){if(solved.word||failed) return; if(guessWord.length<5){guessWord+=l; update(document.getElementById("wordBoard"),rowWord,guessWord,false);} if(guessWord.length===5){guesses++; colorCheck(document.getElementById("wordBoard"),rowWord,guessWord.split(""),wordAnswer.split(""),false); if(guessWord===wordAnswer) solve("word"); rowWord++; guessWord=""; if(rowWord>=6 && !solved.word) endGame(false);}}
function pressNumber(n){if(solved.number||failed) return; if(guessNum.length<5){guessNum+=n; update(document.getElementById("numberBoard"),rowNum,guessNum,false);} if(guessNum.length===5){guesses++; colorCheck(document.getElementById("numberBoard"),rowNum,guessNum.split(""),numberAnswer.split(""),false); if(guessNum===numberAnswer) solve("number"); rowNum++; guessNum=""; if(rowNum>=6 && !solved.number) endGame(false);}}
function pressColor(c){if(solved.color||failed) return; if(guessColor.length<5){guessColor.push(c); update(document.getElementById("colorBoard"),rowColor,guessColor,true);} if(guessColor.length===5){guesses++; colorCheck(document.getElementById("colorBoard"),rowColor,guessColor,colorAnswer,true); if(JSON.stringify(guessColor)===JSON.stringify(colorAnswer)) solve("color"); rowColor++; guessColor=[]; if(rowColor>=6 && !solved.color) endGame(false);}}

function solve(type){
  if(solved[type]||failed) return;
  solved[type]=true;
  time+=45;
  let hintText="";
  if(type==="word"){ let idx=Math.floor(Math.random()*5); hintText="Hinweis für Zahlen/Farben: Buchstabe "+(idx+1)+" = "+wordAnswer[idx]; }
  if(type==="number"){ let idx=Math.floor(Math.random()*5); hintText="Hinweis für Wort/Farben: Ziffer "+(idx+1)+" = "+numberAnswer[idx]; }
  if(type==="color"){ let idx=Math.floor(Math.random()*5); hintText="Hinweis für Wort/Zahlen: Farbe "+(idx+1); }
  document.getElementById("hint").innerText=hintText;
  if(solved.word && solved.number && solved.color) endGame(true);
}

function endGame(win){
  failed=!win;
  document.getElementById("tabWordBtn").disabled=true;
  document.getElementById("tabNumberBtn").disabled=true;
  document.getElementById("tabColorBtn").disabled=true;
  document.getElementById("tabResultBtn").classList.remove("hidden");
  tab('result');
  let results=document.getElementById("resultsBoard");
  results.innerHTML="";
  results.innerHTML+="<div>Status: "+(win?"Gewonnen":"Verloren")+"</div>";
  results.innerHTML+="<div>Zeit übrig: "+time+"</div>";
  results.innerHTML+="<div>Versuche: "+guesses+"</div>";
  let high=localStorage.getItem("triHigh");
  if(win && (!high || time>high)){localStorage.setItem("triHigh",time); high=time;}
  results.innerHTML+="<div>Highscore: "+high+"</div>";
}

function restartGame(){location.reload();}
</script>
</body>
</html>
